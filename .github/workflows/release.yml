name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build-macos:
    name: Build macOS artifacts
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: x86_64-apple-darwin,aarch64-apple-darwin

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: macos-universal

      - name: Install desktop dependencies
        working-directory: apps/desktop
        run: corepack yarn install --no-lockfile --non-interactive

      - name: Run Rust tests
        run: cargo test --workspace --exclude linkpilot-desktop

      - name: Build CLI (x86_64)
        run: cargo build --release --target x86_64-apple-darwin -p linkpilot-cli

      - name: Build CLI (aarch64)
        run: cargo build --release --target aarch64-apple-darwin -p linkpilot-cli

      - name: Build daemon (x86_64)
        run: cargo build --release --target x86_64-apple-darwin -p linkpilot-headless-daemon

      - name: Build daemon (aarch64)
        run: cargo build --release --target aarch64-apple-darwin -p linkpilot-headless-daemon

      - name: Lipo CLI + daemon into universal binaries
        run: |
          mkdir -p target/universal-apple-darwin/release
          lipo -create -output target/universal-apple-darwin/release/lpt \
            target/x86_64-apple-darwin/release/lpt \
            target/aarch64-apple-darwin/release/lpt
          lipo -info target/universal-apple-darwin/release/lpt
          lipo -create -output target/universal-apple-darwin/release/linkpilot-daemon \
            target/x86_64-apple-darwin/release/linkpilot-daemon \
            target/aarch64-apple-darwin/release/linkpilot-daemon
          lipo -info target/universal-apple-darwin/release/linkpilot-daemon

      - name: Build desktop .app (universal)
        working-directory: apps/desktop
        run: corepack yarn run tauri build --target universal-apple-darwin --bundles app

      # Ship the `lpt` CLI inside the .app so installing the DMG gives
      # users both a GUI and a CLI. The Settings page exposes a
      # one-click symlink-to-PATH installer (`cli_install_to_path`)
      # that targets ~/.local/bin/lpt from this bundled binary.
      #
      # Same trick for `linkpilot-daemon`: the GUI's first-run hook
      # writes the LaunchAgent plist pointing at Contents/MacOS/
      # linkpilot-daemon, and `lpt daemon install` (M2) will too.
      - name: Embed lpt CLI and daemon inside the .app
        run: |
          set -euo pipefail
          APP=target/universal-apple-darwin/release/bundle/macos/LinkPilot.app
          cp target/universal-apple-darwin/release/lpt "$APP/Contents/MacOS/lpt"
          chmod +x "$APP/Contents/MacOS/lpt"
          cp target/universal-apple-darwin/release/linkpilot-daemon \
             "$APP/Contents/MacOS/linkpilot-daemon"
          chmod +x "$APP/Contents/MacOS/linkpilot-daemon"

      # tauri-plugin-deep-link auto-injects a CFBundleURLTypes entry with
      # Editor role and an internal-looking URL name; macOS's "Default
      # web browser" picker needs Viewer role, a human-readable name,
      # LSHandlerRank=Default, plus CFBundleDocumentTypes for HTML.
      # patch-info-plist.sh rewrites those keys on the bundled .app.
      # Must run AFTER `tauri build --bundles app` (the keys don't exist
      # until the plugin injects them) and BEFORE DMG creation (otherwise
      # the DMG would embed the unpatched plist).
      - name: Patch Info.plist for default-browser registration
        run: |
          chmod +x apps/desktop/scripts/patch-info-plist.sh
          apps/desktop/scripts/patch-info-plist.sh \
            target/universal-apple-darwin/release/bundle/macos/LinkPilot.app

      # Manual DMG creation instead of `tauri build --bundles dmg`: that
      # would re-bundle the .app from scratch and overwrite the patched
      # Info.plist. Tauri's default DMG has no custom background image
      # or window layout (no `bundle.macOS.dmg` in tauri.conf.json), so
      # a vanilla "drag to /Applications" disk image matches the
      # previous release output.
      - name: Build DMG from patched .app
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          STAGE="$(mktemp -d)"
          cp -R target/universal-apple-darwin/release/bundle/macos/LinkPilot.app "$STAGE/"
          ln -s /Applications "$STAGE/Applications"
          mkdir -p dist/release
          hdiutil create \
            -volname "LinkPilot" \
            -srcfolder "$STAGE" \
            -ov \
            -format UDZO \
            "dist/release/LinkPilot_${VERSION}_universal.dmg"

      - name: Package artifacts
        shell: bash
        run: |
          set -euo pipefail
          # Tarball renamed `lp-macos.tar.gz` → `lpt-macos.tar.gz` in M5.4
          # (binary collision with macOS-bundled /usr/bin/lp). Homebrew
          # tap recipes pinned to v0.2.0-alpha.3 still reference the
          # old name; M6 final-tag bumps the formula to track this.
          cp target/universal-apple-darwin/release/lpt dist/release/lpt-macos
          tar -C dist/release -czf dist/release/lpt-macos.tar.gz lpt-macos
          # Standalone daemon tarball — for CLI-only users who want a
          # background service without installing the .app. Inside the
          # tarball the binary is named `linkpilot-daemon` so a user can
          # `mv linkpilot-daemon ~/.local/bin/` and then `linkpilot-daemon
          # --serve` directly.
          cp target/universal-apple-darwin/release/linkpilot-daemon \
             dist/release/linkpilot-daemon-macos
          # The tarball entry must be named `linkpilot-daemon` so users can
          # `mv linkpilot-daemon ~/.local/bin/` after `tar -xzf`. macOS runners
          # ship BSD tar (no `--transform`), so stage the file under its final
          # name in a temp dir instead of relying on tar to rename it.
          staging="$(mktemp -d)"
          cp target/universal-apple-darwin/release/linkpilot-daemon \
             "$staging/linkpilot-daemon"
          tar -C "$staging" -czf dist/release/linkpilot-daemon-macos.tar.gz \
              linkpilot-daemon
          rm -rf "$staging"
          shasum -a 256 dist/release/* > dist/release/checksums.txt

      # This repo has immutable releases enabled, so assets can only be
      # uploaded while the release is still a draft. Create the draft with
      # all assets, then publish it in the next step. Once published it can
      # no longer be edited — which is exactly the immutable-release
      # guarantee the repo opted into.
      - name: Create GitHub Release (draft, with assets)
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          files: dist/release/*

      - name: Publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          IS_PRERELEASE: ${{ contains(github.ref_name, '-') }}
        run: |
          set -euo pipefail
          gh release edit "$TAG" \
            --draft=false \
            --prerelease="$IS_PRERELEASE"
