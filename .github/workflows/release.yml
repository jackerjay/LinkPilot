name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build-macos:
    name: Build macOS artifacts
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: x86_64-apple-darwin,aarch64-apple-darwin

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: macos-universal

      - name: Install desktop dependencies
        working-directory: apps/desktop
        run: corepack yarn install --no-lockfile --non-interactive

      - name: Run Rust tests
        run: cargo test --workspace --exclude linkpilot-desktop

      - name: Build CLI (x86_64)
        run: cargo build --release --target x86_64-apple-darwin -p linkpilot-cli

      - name: Build CLI (aarch64)
        run: cargo build --release --target aarch64-apple-darwin -p linkpilot-cli

      - name: Lipo CLI into universal binary
        run: |
          mkdir -p target/universal-apple-darwin/release
          lipo -create -output target/universal-apple-darwin/release/lp \
            target/x86_64-apple-darwin/release/lp \
            target/aarch64-apple-darwin/release/lp
          lipo -info target/universal-apple-darwin/release/lp

      - name: Build desktop DMG (universal)
        working-directory: apps/desktop
        run: corepack yarn run tauri build --target universal-apple-darwin --bundles dmg

      - name: Package artifacts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist/release
          cp target/universal-apple-darwin/release/lp dist/release/lp-macos
          tar -C dist/release -czf dist/release/lp-macos.tar.gz lp-macos
          cp target/universal-apple-darwin/release/bundle/dmg/*.dmg dist/release/
          shasum -a 256 dist/release/* > dist/release/checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          files: dist/release/*
