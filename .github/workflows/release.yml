name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build-macos:
    name: Build macOS artifacts
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.80.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Install desktop dependencies
        working-directory: apps/desktop
        run: npm ci

      - name: Run Rust tests
        run: cargo test --workspace --exclude linkpilot-desktop

      - name: Build CLI
        run: cargo build --release -p linkpilot-cli

      - name: Build desktop DMG
        working-directory: apps/desktop
        run: npm run tauri -- build --bundles dmg

      - name: Package artifacts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist/release
          cp target/release/lp dist/release/lp-macos
          tar -C dist/release -czf dist/release/lp-macos.tar.gz lp-macos
          cp target/release/bundle/dmg/*.dmg dist/release/
          shasum -a 256 dist/release/* > dist/release/checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          files: dist/release/*
