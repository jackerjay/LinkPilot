name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build-macos:
    name: Build macOS (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      # Don't abort the other arch on a single failure — both legs are
      # informative for triage. The `publish` job has `needs:` on the
      # whole matrix, so a half-green run still won't publish.
      fail-fast: false
      matrix:
        include:
          - arch: aarch64
            target: aarch64-apple-darwin
            runner: macos-14    # Apple-Silicon GitHub runner
          - arch: x86_64
            target: x86_64-apple-darwin
            runner: macos-15-intel    # Intel GitHub runner (macos-13 retired 2025-12)
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: macos-${{ matrix.arch }}

      - name: Install desktop dependencies
        working-directory: apps/desktop
        run: corepack yarn install --no-lockfile --non-interactive

      - name: Run Rust tests
        run: cargo test --workspace --exclude linkpilot-desktop

      - name: Build CLI
        run: cargo build --release --target ${{ matrix.target }} -p linkpilot-cli

      - name: Build daemon
        run: cargo build --release --target ${{ matrix.target }} -p linkpilot-headless-daemon

      - name: Build desktop .app
        working-directory: apps/desktop
        run: corepack yarn run tauri build --target ${{ matrix.target }} --bundles app

      # Ship the `lpt` CLI inside the .app so installing the DMG gives
      # users both a GUI and a CLI. The Settings page exposes a
      # one-click symlink-to-PATH installer (`cli_install_to_path`)
      # that targets ~/.local/bin/lpt from this bundled binary.
      #
      # Same trick for `linkpilot-daemon`: the GUI's first-run hook
      # writes the LaunchAgent plist pointing at Contents/MacOS/
      # linkpilot-daemon, and `lpt daemon install` (M2) will too.
      - name: Embed lpt CLI and daemon inside the .app
        run: |
          set -euo pipefail
          APP=target/${{ matrix.target }}/release/bundle/macos/LinkPilot.app
          cp target/${{ matrix.target }}/release/lpt "$APP/Contents/MacOS/lpt"
          chmod +x "$APP/Contents/MacOS/lpt"
          cp target/${{ matrix.target }}/release/linkpilot-daemon \
             "$APP/Contents/MacOS/linkpilot-daemon"
          chmod +x "$APP/Contents/MacOS/linkpilot-daemon"

      # tauri-plugin-deep-link auto-injects a CFBundleURLTypes entry with
      # Editor role and an internal-looking URL name; macOS's "Default
      # web browser" picker needs Viewer role, a human-readable name,
      # LSHandlerRank=Default, plus CFBundleDocumentTypes for HTML.
      # patch-info-plist.sh rewrites those keys on the bundled .app.
      # Must run AFTER `tauri build --bundles app` (the keys don't exist
      # until the plugin injects them) and BEFORE DMG creation (otherwise
      # the DMG would embed the unpatched plist).
      - name: Patch Info.plist for default-browser registration
        run: |
          chmod +x apps/desktop/scripts/patch-info-plist.sh
          apps/desktop/scripts/patch-info-plist.sh \
            target/${{ matrix.target }}/release/bundle/macos/LinkPilot.app

      # DMG built with create-dmg, not `tauri build --bundles dmg` (which
      # re-bundles the .app from scratch and clobbers the patched
      # Info.plist). Feeding create-dmg our already-patched .app keeps the
      # plist intact while baking a Finder layout (.DS_Store: window size +
      # icon positions + Applications drop-link) so the mounted volume
      # shows the app-left / arrow / Applications-right install window.
      # Background is apps/desktop/dmg/dmg-background.tiff — a hidpi TIFF
      # holding a 600x400 (1x) + 1200x800 (2x) rep so Finder fills the
      # 600x400-point window at 1x and stays crisp on Retina. Regenerate
      # from the sibling .svg: rsvg-convert -w 600 -h 400 → .png,
      # rsvg-convert -w 1200 -h 800 → @2x.png, then
      # `tiffutil -cathidpicheck dmg-background.png dmg-background@2x.png
      # -out dmg-background.tiff`.
      - name: Build DMG from patched .app
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          brew install create-dmg
          STAGE="$(mktemp -d)"
          cp -R target/${{ matrix.target }}/release/bundle/macos/LinkPilot.app "$STAGE/"
          mkdir -p dist/release
          create-dmg \
            --volname "LinkPilot" \
            --background "apps/desktop/dmg/dmg-background.tiff" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 128 \
            --icon "LinkPilot.app" 150 190 \
            --hide-extension "LinkPilot.app" \
            --app-drop-link 450 190 \
            "dist/release/LinkPilot_${VERSION}_${{ matrix.arch }}.dmg" \
            "$STAGE"

      - name: Package artifacts
        shell: bash
        run: |
          set -euo pipefail
          ARCH="${{ matrix.arch }}"
          # Per-arch CLI binary + tarball. Inside the tarball the binary
          # is still named `lpt` so `mv lpt ~/.local/bin/` after extract
          # works regardless of arch (the arch is only in the asset name).
          cp target/${{ matrix.target }}/release/lpt \
             "dist/release/lpt-macos-${ARCH}"
          staging="$(mktemp -d)"
          cp target/${{ matrix.target }}/release/lpt "$staging/lpt"
          tar -C "$staging" -czf "dist/release/lpt-macos-${ARCH}.tar.gz" lpt
          rm -rf "$staging"

          # Standalone daemon tarball — for CLI-only users who want a
          # background service without installing the .app. Inside the
          # tarball the binary is named `linkpilot-daemon` so a user can
          # `mv linkpilot-daemon ~/.local/bin/` after extract.
          cp target/${{ matrix.target }}/release/linkpilot-daemon \
             "dist/release/linkpilot-daemon-macos-${ARCH}"
          staging="$(mktemp -d)"
          cp target/${{ matrix.target }}/release/linkpilot-daemon \
             "$staging/linkpilot-daemon"
          tar -C "$staging" \
              -czf "dist/release/linkpilot-daemon-macos-${ARCH}.tar.gz" \
              linkpilot-daemon
          rm -rf "$staging"

          # Per-arch checksums file — the publish job concatenates both
          # arches' files into a single unified `checksums.txt`.
          (cd dist/release && shasum -a 256 *) > "dist/release/checksums-${ARCH}.txt"

      - name: Upload arch artifacts
        uses: actions/upload-artifact@v7
        with:
          name: release-${{ matrix.arch }}
          path: dist/release/*
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    needs: build-macos
    runs-on: ubuntu-latest
    steps:
      - name: Download arch artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist/incoming

      - name: Combine artifacts + unified checksums
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist/release
          # Move every file from every arch's artifact dir into one
          # flat dist/release/. Per-arch checksums files are dropped —
          # we regenerate one unified checksums.txt below so users have
          # a single source of truth.
          find dist/incoming -type f ! -name 'checksums-*.txt' -exec cp {} dist/release/ \;
          (cd dist/release && shasum -a 256 *) > dist/release/checksums.txt
          ls -la dist/release

      # This repo has immutable releases enabled, so assets can only be
      # uploaded while the release is still a draft. Create the draft
      # with all assets, then publish it in the next step. Once published
      # it can no longer be edited — which is exactly the immutable-release
      # guarantee the repo opted into.
      - name: Create GitHub Release (draft, with assets)
        uses: softprops/action-gh-release@v3
        with:
          draft: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          files: dist/release/*

      - name: Publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # This job never checks out the repo (it only downloads
          # artifacts), so `gh` has no git remote to infer the repo from
          # and `gh release edit` dies with "not a git repository".
          # GH_REPO tells gh which repo to act on without a working tree.
          GH_REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
          IS_PRERELEASE: ${{ contains(github.ref_name, '-') }}
        run: |
          set -euo pipefail
          gh release edit "$TAG" \
            --draft=false \
            --prerelease="$IS_PRERELEASE"
