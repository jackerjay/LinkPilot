# Publishes @linkpilot/config to npm whenever a `v*.*.*` tag is pushed.
#
# Triggers on the same tag pattern release.yml uses, so a single
# `git push origin v0.2.0` fires both:
#   - release.yml: build CLI + daemon + DMG, attach to GitHub Release
#   - npm-publish.yml (this one): build + npm publish the DSL package
#
# Prereq the maintainer sets up once per repo:
#   - GitHub repo secret `NPM_TOKEN` with publish scope for @linkpilot
#   - `@linkpilot` npm scope reserved (`npm access list packages
#      jackerjay` after `npm login` should show it)
#
# Pre-releases (tags like v0.2.0-alpha.1) are published with the
# `next` dist-tag instead of `latest` so `npm install @linkpilot/config`
# keeps pointing at the last stable. The `next` tag tracks pre-release
# bleeding-edge for early adopters.

name: npm publish

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

jobs:
  publish:
    name: Publish @linkpilot/config
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/config-dsl
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          # Configures `~/.npmrc` so subsequent `npm publish` picks up
          # NODE_AUTH_TOKEN from the env. Without this, npm publish
          # tries an anonymous publish and fails with E401.
          registry-url: "https://registry.npmjs.org"
          scope: "@linkpilot"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          # Track the same bun major the project uses locally
          # (packages/config-dsl/bun.lock was generated on bun 1.3.x).
          bun-version: "1.3"

      - name: Stamp version from tag
        # The published version is derived from the git tag, not from the
        # committed package.json. The workspace version is bumped by hand
        # across Cargo.toml / apps/desktop / tauri.conf.json, and config-dsl
        # was repeatedly forgotten — every release since v0.4.0 failed the old
        # "verify matches" gate. Stamping from the tag makes the publish
        # deterministic: npm always gets the tagged version regardless of what
        # the release commit happened to leave in package.json.
        # --allow-same-version keeps it a no-op when they already agree.
        run: |
          set -euo pipefail
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          npm version "$TAG_VERSION" --no-git-tag-version --allow-same-version
          echo "config-dsl version set to $TAG_VERSION"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck + build
        run: bun run build

      - name: Run unit tests
        run: bun test

      - name: Choose dist-tag
        id: dist_tag
        run: |
          # Pre-release tags (anything with a `-`) publish as `next`;
          # plain x.y.z tags publish as `latest`. Mirrors what most npm
          # libraries do for alpha / beta / rc.
          if [[ "$GITHUB_REF_NAME" == *-* ]]; then
            echo "tag=next" >> "$GITHUB_OUTPUT"
          else
            echo "tag=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          npm publish --access public --tag "${{ steps.dist_tag.outputs.tag }}"
