name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - claude/elegant-nash-381d81

permissions:
  contents: read

jobs:
  rust:
    name: Rust
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          components: rustfmt, clippy

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --exclude linkpilot-desktop --all-targets -- -D warnings

      - name: Test
        run: cargo test --workspace --exclude linkpilot-desktop

      - name: Check desktop crate
        run: cargo check -p linkpilot-desktop

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/desktop
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: corepack yarn install --no-lockfile --non-interactive

      - name: Check TypeScript binary
        run: corepack yarn run tsc --version

      - name: Build frontend
        run: corepack yarn run build

  desktop-bundle:
    name: Desktop bundle smoke test
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: macos-bundle-smoke

      - name: Install desktop dependencies
        working-directory: apps/desktop
        run: corepack yarn install --no-lockfile --non-interactive

      # Builds the .app bundle only (skips DMG packaging) in debug mode
      # so the Tauri bundling pipeline — icons, Info.plist, capabilities,
      # frontend assets — gets exercised on every PR without paying the
      # full release-build cost.
      - name: Build Tauri .app (debug)
        working-directory: apps/desktop
        run: corepack yarn run tauri build --debug --bundles app
