name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - claude/elegant-nash-381d81

permissions:
  contents: read

jobs:
  rust:
    name: Rust
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          components: rustfmt, clippy

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --exclude linkpilot-desktop --all-targets -- -D warnings

      - name: Test
        run: cargo test --workspace --exclude linkpilot-desktop

      - name: Check desktop crate
        run: cargo check -p linkpilot-desktop

  frontend:
    name: Frontend
    runs-on: macos-latest
    defaults:
      run:
        working-directory: apps/desktop
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json

      - name: Install dependencies
        run: npm ci --include=dev

      - name: Check TypeScript binary
        run: ./node_modules/.bin/tsc --version

      - name: Build frontend
        run: npm run build
