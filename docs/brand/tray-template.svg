<?xml version="1.0" encoding="UTF-8"?>
<!-- LinkPilot menu-bar tray template.
     macOS templateImage: paint only black on transparent. The system
     applies appearance-aware tinting (light/dark, active/inactive). Keep
     strokes thick at 22pt so the icon stays legible in the menu bar.
     Mirrors the brand mark: a rounded "p" (ring + descending stem) with a
     paper-plane "send" dart in the counter — the full-colour logo's stars
     and gradients are dropped (too noisy at 22pt). -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 22 22" width="22" height="22">
  <g fill="#000" fill-rule="evenodd">
    <!-- Bowl of the "p": a bold ring -->
    <circle cx="12" cy="8.6" r="5.3" fill="none" stroke="#000" stroke-width="2.2"/>
    <!-- Descending stem on the left, merging into the ring's left edge -->
    <rect x="4.3" y="8.6" width="2.9" height="10.6" rx="1.45"/>
    <!-- Paper plane in the counter, nose to lower-left, subtle tail fold -->
    <path d="M 9.3 11.3
             L 13.7 5.5
             L 13.0 7.7
             L 15.0 9.3
             z"/>
  </g>
</svg>
